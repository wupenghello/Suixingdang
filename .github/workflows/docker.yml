name: 测试 · 构建 · 部署

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/wupenghello/suixingdang

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 装依赖
        run: pip install -r server/requirements.txt -r server/requirements-dev.txt
      - name: 跑测试
        run: pytest -v
        working-directory: server
      - name: 依赖漏洞扫描（顾问，不阻塞构建）
        run: pip-audit -r server/requirements.txt
        continue-on-error: true

  frontend:
    name: 前端单测（vitest）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'server/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: 装前端测试依赖
        run: npm ci
        working-directory: server
      - name: 跑前端单测
        run: npm test
        working-directory: server

  build-and-push:
    needs: [test, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # 镜像构建成功后自动 SSH 登录服务器拉新镜像并重启，省掉手动 pull && up。
    # 所需 Secrets（仓库 Settings → Secrets and variables → Actions）：
    #   SSH_HOST    服务器 IP 或域名
    #   SSH_USER    SSH 登录用户（如 root）
    #   SSH_KEY     SSH 私钥（专用 deploy key，见 docs/UPDATE.md）
    #   SSH_PORT    SSH 端口（可选，默认 22）
    #   DEPLOY_DIR  部署目录（可选，默认 ~）
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_DIR || '~' }}
            docker compose pull
            docker compose up -d
            docker compose ps
            docker image prune -f || true
