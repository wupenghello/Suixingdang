name: 测试 · 构建 · 部署

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/wupenghello/suixingdang

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 装依赖
        run: pip install -r server/requirements.txt -r server/requirements-dev.txt
      - name: 跑测试
        run: pytest -v
        working-directory: server
      - name: 依赖漏洞扫描（顾问，不阻塞构建）
        run: pip-audit -r server/requirements.txt
        continue-on-error: true

  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: 构建新前端并同步进镜像构建上下文
        run: |
          cd web
          npm ci --no-audit --no-fund
          npm run build
          mkdir -p ../server/web-dist
          cp -r dist/. ../server/web-dist/
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    # 镜像构建成功后：先把仓库里的 docker-compose.yml / Caddyfile 同步到服务器部署目录
    # （此前 install.sh 一次性放置后从不更新，仓库里新增的 worker 服务、Caddyfile
    # 调整到生产永远不生效），再 SSH 拉新镜像重启，省掉手动 pull && up。
    # 所需 Secrets（仓库 Settings → Secrets and variables → Actions）：
    #   SSH_HOST    服务器 IP 或域名
    #   SSH_USER    SSH 登录用户（如 root）
    #   SSH_KEY     SSH 私钥（专用 deploy key，见 docs/UPDATE.md）
    #   SSH_PORT    SSH 端口（可选，默认 22）
    #   DEPLOY_DIR  部署目录（可选，默认 ~）
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: 推送 compose/Caddyfile 到服务器暂存区
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          source: "docker-compose.yml,Caddyfile"
          target: "/tmp/suixingdang-deploy"
      - name: SSH 部署到服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 30m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_DIR || '~' }}
            # 主机侧配置与仓库对齐。用 cp 而非 mv：Caddyfile 以文件 bind mount
            # 挂进 caddy 容器，挂载认原 inode，改名换 inode 的替换容器内不可见。
            cp /tmp/suixingdang-deploy/docker-compose.yml docker-compose.yml
            cp /tmp/suixingdang-deploy/Caddyfile Caddyfile
            rm -rf /tmp/suixingdang-deploy
            # 防 OOM：小内存 VPS 上 server+worker（均加载 chromadb）同时启动的
            # 内存峰值曾触发 OOM killer 杀掉本 SSH 会话（deploy 以 137 失败）。
            # 无交换分区时补 2G swap（幂等；非 root / 磁盘不足则跳过不阻塞部署）。
            if ! swapon --show=NAME --noheadings 2>/dev/null | grep -q .; then
              if fallocate -l 2G /swapfile 2>/dev/null && chmod 600 /swapfile \
                  && mkswap /swapfile >/dev/null && swapon /swapfile; then
                grep -q '^/swapfile' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
                echo 'swap 2G enabled'
              else
                echo 'WARN: swap setup skipped (need root / free disk)' >&2
              fi
            fi
            free -m
            docker compose pull
            # 错峰启动：先等 server 完全就绪（Alembic 迁移 + chromadb 加载），
            # 再拉 worker，避免两个进程同时加载 chromadb 挤爆 1G 内存触发查杀。
            docker compose up -d server
            for i in $(seq 1 40); do
              curl -fsS http://127.0.0.1:8000/api/health >/dev/null 2>&1 && break
              sleep 3
            done
            docker compose up -d
            # Caddyfile 以 bind mount 挂入 caddy：内容变更不计入 compose 配置
            # hash，普通 up -d 既不重建 caddy、也感知不到新配置（配置非法时
            # caddy 还会陷入崩溃重启退避，越拖越久）。策略：
            # 1) 一次性容器先校验新配置——非法则 job 失败，运行中的 caddy 不受
            #    影响（零停机纪律：坏配置不上线）
            # 2) 校验通过后强制重建 caddy（顺带重置崩溃重启退避）
            # 3) 等连续 running 才算稳定（规避崩溃循环中瞬时 Running 的竞态），
            #    最后 reload 兜底（配置相同则无变化）
            docker compose run --rm --no-deps -T caddy caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
            docker compose up -d --force-recreate caddy
            stable=0
            for i in $(seq 1 30); do
              if [ "$(docker inspect -f '{{.State.Running}}' suixingdang-caddy 2>/dev/null)" = true ]; then
                stable=$((stable+1))
                [ "$stable" -ge 3 ] && break
              else
                stable=0
              fi
              sleep 2
            done
            [ "$stable" -ge 3 ] || { echo 'ERROR: caddy 60s 内未稳定 running，附日志：' >&2; docker compose logs --tail=30 caddy >&2; exit 1; }
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
            docker compose ps
            # 健康检查：输出含 version，可在日志确认部署到的版本号；超时则 job 失败
            # 并附 server 日志，避免"CI 绿了但服务没起来"的静默失败。
            ok=0
            for i in $(seq 1 20); do
              if curl -fsS http://127.0.0.1:8000/api/health; then ok=1; echo; break; fi
              sleep 3
            done
            [ "$ok" = 1 ] || { echo 'ERROR: /api/health 60s 内未就绪' >&2; docker compose logs --tail=50 server >&2; exit 1; }
            docker image prune -f || true
      - name: SSH 验证部署结果（独立会话：主步骤失败也取证）
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || '22' }}
          command_timeout: 5m
          script: |
            cd ${{ secrets.DEPLOY_DIR || '~' }}
            echo '=== 内存 ==='
            free -m
            echo '=== 最近内核查杀记录（OOM killer）==='
            dmesg -T 2>/dev/null | grep -iE 'oom|killed process' | tail -10 || true
            echo '=== 容器状态（含重启计数）==='
            docker compose ps -a
            echo '=== caddy 日志 ==='
            docker compose logs --tail=30 caddy || true
            echo '=== 健康检查（输出 version）==='
            ok=0
            for i in $(seq 1 10); do
              if curl -fsS http://127.0.0.1:8000/api/health; then ok=1; echo; break; fi
              sleep 3
            done
            if [ "$ok" != 1 ]; then
              echo 'ERROR: 验证失败，/api/health 未就绪，附 server 日志：' >&2
              docker compose logs --tail=60 server >&2 || true
              exit 1
            fi
            caddy_state=$(docker inspect -f '{{.State.Status}}' suixingdang-caddy 2>/dev/null || echo missing)
            echo "caddy 状态: $caddy_state"
            if [ "$caddy_state" != running ]; then
              echo 'ERROR: caddy 未运行（公网入口不可用），附日志：' >&2
              docker compose logs --tail=30 caddy >&2 || true
              exit 1
            fi
            echo '=== 用户端 /（应为 React 正式版，index.html 引用 /assets/index-*）==='
            root_html=$(curl -fsS http://127.0.0.1:8000/ 2>/dev/null || true)
            if echo "$root_html" | grep -q 'assets/index-'; then
              echo 'OK: / 已服务新前端正式版'
            else
              echo 'ERROR: / 未返回新前端构建产物（可能 web/dist 未进镜像），实际内容前 300 字节：' >&2
              echo "$root_html" | head -c 300 >&2
              exit 1
            fi
            echo '=== /next 旧灰度地址应 301 回 / ==='
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/next/)
            [ "$code" = 301 ] || { echo "ERROR: /next/ 期望 301，实际 $code" >&2; exit 1; }
            echo '=== 管理后台 /admin 与落地页 /welcome ==='
            curl -fsS http://127.0.0.1:8000/admin 2>/dev/null | grep -q 'admin/assets/admin.js' \
              || { echo 'ERROR: /admin 不可用或未引用迁移后的 admin/assets' >&2; exit 1; }
            curl -fsSo /dev/null http://127.0.0.1:8000/welcome \
              || { echo 'ERROR: /welcome 落地页不可用' >&2; exit 1; }
