name: 测试

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 装依赖
        run: pip install -r server/requirements.txt -r server/requirements-dev.txt
      - name: 跑测试
        run: pytest -v
        working-directory: server
      - name: 依赖漏洞扫描（顾问，不阻塞构建）
        run: pip-audit -r server/requirements.txt
        continue-on-error: true

  frontend:
    name: 前端单测（vitest）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # F17 cache-busting 检查需要 git 历史
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'server/.nvmrc'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'
      - name: 装前端测试依赖
        run: npm ci
        working-directory: server
      - name: 跑前端单测
        run: npm test
        working-directory: server
      - name: cache-busting 检查（改静态文件须升 ?v=）
        run: node scripts/check-cache-busting.mjs
        working-directory: server
        env:
          BASE: origin/${{ github.base_ref }}
        if: github.event_name == 'pull_request'
        continue-on-error: true

  webapp:
    name: 新前端（S3：React+TS 构建 + 单测）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'
      - name: 装依赖
        run: npm ci --no-audit --no-fund
        working-directory: web
      - name: 跑前端单测（vitest）
        run: npx vitest run
        working-directory: web
      - name: 类型检查 + 生产构建
        run: npm run build
        working-directory: web
