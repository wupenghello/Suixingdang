name: 测试

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 装依赖
        run: pip install -r server/requirements.txt -r server/requirements-dev.txt
      - name: 跑测试
        run: pytest -v
        working-directory: server
