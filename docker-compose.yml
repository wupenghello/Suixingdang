services:
  server:
    image: ghcr.io/wupenghello/suixingdang:latest
    build: ./server   # 生产部署拉 image 无需源码；本地/CI 构建用 build
    container_name: suixingdang-server
    restart: unless-stopped
    env_file: .env
    volumes:
      # 建议将主机 ${DATA_DIR} 置于 LUKS/dm-crypt 加密卷上，
      # 一次覆盖文件 + SQLite + ChromaDB，防磁盘失窃/备份泄露。详见 docs/DEPLOY_SECURITY.md。
      - ${DATA_DIR:-/data/suixingdang}:/data
    ports:
      # 仅绑定到本机回环：公网无法直连 8000，公网入口只走 Caddy 的 80/443。
      # Caddy 通过 Docker 内部网络以 server:8000 反代，不依赖此主机端口映射。
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: suixingdang-caddy
    restart: unless-stopped
    environment:
      # 把 .env 的 DOMAIN 注入 caddy 容器，供 Caddyfile 的 {$DOMAIN} 取用。
      # 只传 DOMAIN 单个变量，不把含密钥的整个 .env 喂给 caddy。
      - DOMAIN=${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  caddy_data:
  caddy_config:
