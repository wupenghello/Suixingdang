services:
  server:
    build: ./server
    container_name: suixingdang-server
    restart: unless-stopped
    env_file: .env
    volumes:
      # 建议将主机 ${DATA_DIR} 置于 LUKS/dm-crypt 加密卷上，
      # 一次覆盖文件 + SQLite + ChromaDB，防磁盘失窃/备份泄露。详见 docs/DEPLOY_SECURITY.md。
      - ${DATA_DIR:-/data/suixingdang}:/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    container_name: suixingdang-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  caddy_data:
  caddy_config:
