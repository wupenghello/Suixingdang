# Alembic config (S1: replaces hand-written ALTER TABLE migrations in models.py).
# NOTE: keep this file ASCII-only -- Alembic's Config reads it via configparser
# with the locale default encoding; non-ASCII (e.g. CJK comments) crashes startup
# and the test suite on GBK-locale machines (Windows). sqlalchemy.url is injected
# by alembic/env.py from app.config.settings (SQLite / PostgreSQL).
[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
