<script>
// 与 app.js 完全一致的图标常量与 noteCardHTML，保证标记逐字同构
const ICONS = {
  edit: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>',
  trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M10 11v6M14 11v6"/></svg>',
  ai: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z"/></svg>',
};
const NOTE_CLOCK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5v5l3 2"/></svg>';
const NOTE_PING = '<svg class="note-card-pin-g" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 17v5"/><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/></svg>';
function escapeHtml(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function stripExt(n){ return (n||'').replace(/\.[^.]+$/, ''); }
// —— 与 app.js noteCardHTML 同构 ——
function noteCardHTML(n) {
  const title = escapeHtml(stripExt(n.name) || '未命名笔记');
  const excerpt = escapeHtml(n.summary || n.snippet || '');
  const rel = n.rel || '';
  const size = n.size || '';
  const tags = Array.isArray(n.tags) ? n.tags : [];
  const aiTags = Array.isArray(n.ai_tags) ? n.ai_tags : [];
  const shown = tags.slice(0, 3);
  const extra = tags.length > 3 ? '<span class="note-card-tag more">+' + (tags.length - 3) + '</span>' : '';
  const tagsHtml = (tags.length || aiTags.length)
    ? '<div class="note-card-tags">' + shown.map(t => '<span class="note-card-tag">' + escapeHtml(t) + '</span>').join('') + extra
      + aiTags.slice(0, 2).map(t => '<span class="note-card-tag ai-tag">' + ICONS.ai + escapeHtml(t) + '</span>').join('') + '</div>'
    : '';
  const pin = n.pinned ? NOTE_PING : '';
  return `<article class="note-card" role="button" tabindex="0" aria-label="打开笔记：${title}" data-name="${escapeHtml(n.name)}">
    <div class="note-card-actions">
      <button class="note-card-action" data-action="edit" type="button" title="编辑" aria-label="编辑 ${title}">${ICONS.edit}</button>
      <button class="note-card-action danger" data-action="delete" type="button" title="删除" aria-label="删除 ${title}">${ICONS.trash}</button>
    </div>
    <h3 class="note-card-title">${pin}${title}</h3>
    ${excerpt ? `<p class="note-card-excerpt">${excerpt}</p>` : ''}
    ${tagsHtml}
    <div class="note-card-meta"><span>${NOTE_CLOCK}${rel || '—'}</span>${size ? `<span class="mdot">·</span><span>${size}</span>` : ''}</div>
  </article>`;
}

const PINNED = [
  { name: '随行档 v2 发布清单.md', pinned: true, tags: ['工作'], ai_tags: ['清单'], summary: '镜像构建、GHCR 推送、install.sh 一键部署三件套的验收清单，附回滚预案与灰度节奏。', rel: '2 小时前', size: '3.1 KB' },
  { name: '周末徒步计划.md', pinned: true, tags: ['生活'], ai_tags: [], summary: '武功山反穿路线，D1 发云界扎营看日落，D2 金顶日出后下撤。装备清单见正文。', rel: '5 小时前', size: '1.8 KB' },
];
const ALL = [
  { name: 'FastAPI 异步路由调研.md', tags: ['工作'], ai_tags: ['调研'], summary: 'Depends 注入很适合我们的场景；异步路由配合 SQLite 要注意线程池与连接复用。', rel: '昨天', size: '2.4 KB' },
  { name: '《卡片笔记写作法》摘录.md', tags: ['读书'], ai_tags: [], summary: '永久笔记用自己的话重写，而不是复制粘贴——写作即思考，卡片即复利。', rel: '昨天', size: '980 B' },
  { name: 'Agent 工具调用失败排查.md', tags: ['工作'], ai_tags: ['排障'], summary: '工具循环在第三步偶发 500：JSON 解析超时。加 schema 校验 + 重试后稳定。', rel: '2 天前', size: '1.1 KB' },
  { name: '七月底家庭预算.md', tags: ['生活', '财务'], ai_tags: [], summary: '大件：空调清洗 280、体检套餐 1200；弹性项压缩到 1500 以内。', rel: '3 天前', size: '640 B' },
  { name: '穷查理宝典 · 误判心理学.md', tags: ['读书', '心理', '笔记', '方法论'], ai_tags: [], summary: '', rel: '4 天前', size: '2.0 KB' },
  { name: '日语五十音记忆法.md', tags: ['读书'], ai_tags: ['学习'], summary: '平假名按行分组联想，片假名优先认读不默写；每天 10 分钟 Anki 复习。', rel: '上周', size: '720 B' },
];

const content = document.getElementById('file-content');
function render(mode) {
  const gc = 'notes-grid' + (mode === 'list' ? ' list' : '');
  const block = (arr) => `<div class="${gc}">${arr.map(noteCardHTML).join('')}</div>`;
  let html = `<div class="notes-section-h">置顶 <span class="cnt">(${PINNED.length})</span></div>` + block(PINNED);
  html += `<div class="notes-section-h">全部笔记 <span class="cnt">(${ALL.length})</span></div>` + block(ALL);
  content.innerHTML = html;
}
render('grid');

// 标签筛选条
const chips = [
  { t: '', label: '全部', n: 12, on: true }, { t: '工作', label: '工作', n: 5 },
  { t: '读书', label: '读书', n: 4 }, { t: '生活', label: '生活', n: 2 }, { t: '财务', label: '财务', n: 1 },
];
document.getElementById('notes-chips').innerHTML = chips.map(c =>
  `<button class="note-chip${c.on ? ' on' : ''}" type="button" data-tag="${escapeHtml(c.t)}">${escapeHtml(c.label)} <span class="n">${c.n}</span></button>`).join('');
document.getElementById('notes-chips').addEventListener('click', e => {
  const b = e.target.closest('.note-chip'); if (!b) return;
  document.querySelectorAll('.note-chip').forEach(x => x.classList.toggle('on', x === b));
});

// 排序菜单 / 视图分段 / 搜索清除（交互自检）
const sortBtn = document.getElementById('notes-sort-btn'), sortMenu = document.getElementById('notes-sort-menu');
sortBtn.addEventListener('click', e => { e.stopPropagation(); const o = sortMenu.classList.toggle('open'); sortBtn.setAttribute('aria-expanded', String(o)); });
document.addEventListener('click', e => { if (!e.target.closest('.notes-sort')) sortMenu.classList.remove('open'); });
const vG = document.getElementById('notes-view-grid'), vL = document.getElementById('notes-view-list');
vG.addEventListener('click', () => { vG.classList.add('on'); vL.classList.remove('on'); render('grid'); });
vL.addEventListener('click', () => { vL.classList.add('on'); vG.classList.remove('on'); render('list'); });
const sb = document.getElementById('notes-search'), sbox = document.getElementById('notes-search-box');
sb.addEventListener('input', () => sbox.classList.toggle('has', !!sb.value));
document.getElementById('notes-search-clr').addEventListener('click', () => { sb.value = ''; sbox.classList.remove('has'); });
</script>
</body>
